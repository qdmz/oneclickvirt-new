auth:
    email-password: ${EMAIL_PASSWORD}
    email-smtp-host: smtp.gmail.com
    email-smtp-port: 25
    email-username: qdmzhost
    enable-email: true
    enable-oauth2: false
    enable-public-registration: true
    enable-qq: false
    enable-telegram: false
    qq-app-id: ${QQ_APP_ID}
    qq-app-key: ${QQ_APP_KEY}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN}
captcha:
    enabled: false
    expire-time: 300
    height: 40
    length: 4
    width: 120
cdn:
    base-endpoint: https://cdn.spiritlhl.net/
    endpoints:
        - https://cdn0.spiritlhl.top/
        - http://cdn3.spiritlhl.net/
        - http://cdn1.spiritlhl.net/
        - http://cdn2.spiritlhl.net/
cors:
    mode: ""
    whitelist: []
invite-code:
    enabled: false
    required: false
jwt:
    buffer-time: 1d
    expires-time: 7d
    issuer: oneclickvirt
    signing-key: ""
mysql:
    auto-create: "true"
    config: charset=utf8mb4&parseTime=True&loc=Local
    db-name: oneclickvirt
    engine: InnoDB
    log-mode: error
    log-zap: "false"
    max-idle-conns: "10"
    max-lifetime: "3600"
    max-open-conns: "100"
    password: "123456"
    path: localhost
    port: "3306"
    prefix: ""
    singular: "false"
    username: oneclickvirt
quota:
    instance-type-permissions:
        min-level-for-container: 1
        min-level-for-delete-container: 1
        min-level-for-delete-vm: 2
        min-level-for-reset-container: 1
        min-level-for-reset-vm: 2
        min-level-for-vm: 2
redis:
    addr: ""
    db: 0
    password: "123456"
system:
    addr: 8890
    db-type: mysql
    env: development
    frontend-url: "http://localhost:8080"
    iplimit-count: 15000
    iplimit-time: 3600
    oauth2-state-token-minutes: 15
    oss-type: local
    provider-inactive-hours: 24
    use-multipoint: false
    use-redis: false
task:
    delete-retry-count: 3
    delete-retry-delay: 2
upload:
    max-avatar-size: 2
other:
    default-language: zh-CN
    max-avatar-size: 1
zap:
    director: storage/logs
    encode-level: LowercaseLevelEncoder
    format: console
    level: info
    log-in-console: true
    max-array-elements: 5
    max-backups: 15
    max-file-size: 5
    max-log-length: 2000
    max-string-length: 1000
    prefix: '[oneclickvirt]'
    retention-day: 3
    show-line: false
    stacktrace-key: stacktrace
max_avatar_size: 1
default_language:
signing_key_v1:
    created_at: "2026-03-12T13:52:39.7982892+08:00"
    expires_at: "2026-03-13T13:52:39.7982892+08:00"
    is_active: false
    key: e93c228bb22f3d614b2fb0c04b526ffc4f541f07ccaafdc0f3d44ccb853cae7e
    version: 1
active_version: 1
payment:
    alipay-app-id: ${ALIPAY_APP_ID}
    alipay-gateway: https://openapi.alipay.com/gateway.do
    alipay-private-key: ${ALIPAY_PRIVATE_KEY}
    alipay-public-key: ${ALIPAY_PUBLIC_KEY}
    balance-daily-limit: 9998
    balance-min-amount: 2
    enable-alipay: true
    enable-balance: true
    enable-epay: true
    enable-mapay: true
    enable-wechat: true
    epay-api-url: https://pay.example.com/creat_order
    epay-key: ${EPAY_KEY}
    epay-notify-url: https://heyun.ypvps.com/api/v1/payment/epay/notify
    epay-pid: "2093"
    epay-return-url: https://heyun.ypvps.com/user/wallet
    mapay-api-url: https://pay.example.com/pay
    mapay-id: your-mapid
    mapay-key: ${MAPAY_KEY}
    mapay-notify-url: https://heyun.ypvps.com/api/v1/payment/mapay/notify
    mapay-return-url: https://heyun.ypvps.com/user/wallet
    wechat-api-key: ${WECHAT_API_KEY}
    wechat-api-v3-key: ${WECHAT_API_V3_KEY}
    wechat-app-id: ${WECHAT_APP_ID}
    wechat-mch-id: ${WECHAT_MCH_ID}
    wechat-serial-no: ${WECHAT_SERIAL_NO}
    wechat-type: mp
system_name: 虚拟化管理平台
system_description: 支持多种虚拟化技术的管理平台
enable_email_verification: false
enable_captcha: false
captcha_expire_time: 10
max_login_attempts: 5
login_lockout_duration: 30
enable_ssl: false
ssl_cert_path:
ssl_key_path:
enable_backup: true
backup_retention_days: 7
enable_audit_log: true
audit_log_retention_days: 30
enable_notification: true
notification_email:
smtp_host:
smtp_port: 587
smtp_username:
smtp_password:
smtp_secure: true
